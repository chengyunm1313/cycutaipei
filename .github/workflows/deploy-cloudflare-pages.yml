name: CI Checks

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "migrations/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "migrations/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

concurrency:
  group: ci-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: 自動檢查（不部署）
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: Build Cloudflare artifact (next-on-pages)
        run: npm run pages:build
